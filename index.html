            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 400px;
            width: 100%;

        }
        .logo {

            height: 100px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #001f3f;
            font-size: 40px;
            font-weight: bold;
        }
        
        /* 🔥 Animación de colores para FELICITACIONES */
        .felicidades-animado {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 10px 0 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: cambioColor 2s infinite alternate;
        }
        @keyframes cambioColor {
            0% { color: #FFDC00; }
            25% { color: #2ECC40; }
            50% { color: #FF4136; }
            75% { color: #0074D9; }
            100% { color: #B10DC9; }
        }

        h1 { font-size: 2.2rem; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        h2 { font-size: 1.2rem; margin-bottom: 20px; font-weight: 300; }
        h3 { font-size: 1rem; margin: 25px 0 15px; color: #FFDC00; }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            text-align: center;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #FF4136;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.05); background-color: #ff2b1f; }

        /* 🔗 Redes sociales */
        .social-icons {
            margin-top: 25px;
            font-size: 2.5rem;
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        .social-icons a {
            color: white;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .social-icons a:hover {
            transform: scale(1.2);
            color: #FFDC00;
            text-shadow: 0 0 10px rgba(255, 220, 0, 0.7);
        }
        .social-icons .instagram:hover { color: #E1306C; }
        .social-icons .facebook:hover { color: #1877F2; }
        .social-icons .tiktok:hover { color: #00f2ea; }

        #mensaje-exito { display: none; }
        #formulario-section { display: block; }
        .hidden { display: none !important; }
        
        .premio-text {
            font-size: 1.3rem;
            margin: 15px 0;
            color: #fff;
        }
    </style>
</head>

        </div>
    </div>
