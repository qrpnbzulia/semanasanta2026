<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana Santa 2026 - CPNB Zulia</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 35px;
        }

        h1 {
            color: #2d3748;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .counter {
            background: #f7fafc;
            padding: 12px 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            color: #4a5568;
            font-size: 0.95rem;
        }

        .counter strong {
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }

        /* Success Section */
        .success {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #48bb78;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
        }

        .success h2 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .participant-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .prize-info {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            color: #4a5568;
        }

        .prize-info p {
            margin: 5px 0;
        }

        .institutional-msg {
            margin: 25px 0;
            color: #718096;
            font-size: 0.95rem;
        }

        .institutional-msg strong {
            color: #667eea;
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .social-links a {
            width: 50px;
            height: 50px;
            background: #f7fafc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a5568;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .social-links a:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 25px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .success h2 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>

        <!-- Title -->
        <h1>Semana Santa 2026</h1>
        <p class="subtitle">CPNB Zulia</p>

        <!-- Counter -->
        <div class="counter">
            Eres el visitante <strong id="contador">#...</strong>
        </div>

        <!-- Form Section -->
        <div id="formSection">
            <form id="miFormulario">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido" required maxlength="50">
                </div>

                <div class="form-group">
                    <label for="cedula">Cédula</label>
                    <input type="number" id="cedula" placeholder="8 dígitos" required maxlength="8" pattern="\d{8}">
                </div>

                <button type="submit" id="btnEnviar">Participar</button>
            </form>

            <div id="errorMsg" class="error"></div>
        </div>

        <!-- Success Section -->
        <div id="successSection" class="success">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>

            <h2>¡Felicitaciones!</h2>

            <div class="participant-number">
                Participante #<span id="numeroParticipante">...</span>
            </div>

            <div class="prize-info">
                <p>🎁 Estás participando por grandes premios</p>
                <p style="color: #667eea; font-weight: 600; margin-top: 8px;">Semana Santa 2026</p>
            </div>

            <div class="institutional-msg">
                <strong>CPNB Zulia</strong>
                <p>Síguenos en nuestras redes sociales</p>
            </div>

            <div class="social-links">
                <a href="https://instagram.com/TU_USUARIO" target="_blank" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://facebook.com/TU_USUARIO" target="_blank" title="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="https://tiktok.com/@TU_USUARIO" target="_blank" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Configuration
              const SUPABASE_URL = 'https://jjpukfsxduqtgbhtgiba.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqcHVrZnN4ZHVxdGdiaHRnaWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTI3MjcsImV4cCI6MjA5MDE4ODcyN30.whpdkHn0OjJHPxbzZjgEwsBD4tKtN-_hxN8VGtDW4SU';
        let supabaseClient;
        let contadorActual = 0;

        // Initialize
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error('Error:', e);
        }

        // Load counter
        async function cargarVisitas() {
            try {
                const { data, error } = await supabaseClient
                    .from('contador_visitas')
                    .select('visitas')
                    .eq('id', 1)
                    .single();

                if (error) throw error;

                contadorActual = (data?.visitas || 0) + 1;
                
                await supabaseClient
                    .from('contador_visitas')
                    .update({ visitas: contadorActual })
                    .eq('id', 1);

                document.getElementById('contador').innerText = `#${contadorActual}`;
                document.getElementById('numeroParticipante').innerText = contadorActual;
                
            } catch (err) {
                console.error('Error:', err);
                contadorActual = Math.floor(Math.random() * 500) + 1000;
                document.getElementById('contador').innerText = `#${contadorActual}`;
                document.getElementById('numeroParticipante').innerText = contadorActual;
            }
        }

        // Form submit
        document.getElementById('miFormulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cedula = document.getElementById('cedula').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('btnEnviar');
            
            if (!/^\d{8}$/.test(cedula)) {
                errorMsg.innerText = "La cédula debe tener 8 dígitos";
                errorMsg.style.display = 'block';
                return;
            }
            
            btn.innerText = 'Enviando...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();

            try {
                const { data, error } = await supabaseClient
                    .from('participantes')
                    .insert([{ 
                        nombre, 
                        apellido, 
                        cedula,
                        numero_participante: contadorActual
                    }])
                    .select();

                if (error) {
                    if (error.code === '23505') { 
                        errorMsg.innerText = "Esta cédula ya está registrada";
                    } else {
                        errorMsg.innerText = "Error. Intenta nuevamente";
                    }
                    errorMsg.style.display = 'block';
                    btn.innerText = 'Participar';
                    btn.disabled = false;
                } else {
                    lanzarConfeti();
                    document.getElementById('formSection').classList.add('hidden');
                    document.getElementById('successSection').style.display = 'block';
                }
            } catch (err) {
                console.error('Error:', err);
                errorMsg.innerText = "Error de conexión";
                errorMsg.style.display = 'block';
                btn.innerText = 'Participar';
                btn.disabled = false;
            }
        });

        // Confetti
        function lanzarConfeti() {
            const duration = 2000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: Math.random(), y: Math.random() - 0.2 }
                }));
            }, 250);
        }

        // Start
        if (supabaseClient) {
            cargarVisitas();
        }
    </script>
</body>
</html>
