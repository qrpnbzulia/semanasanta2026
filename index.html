<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana Santa 2026 - CPNB Zulia</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #001f3f 0%, #0074D9 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .logo {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #001f3f;
            font-size: 40px;
            font-weight: bold;
        }
        
        /* 🌈 Animación de colores para FELICITACIONES */
        .felicidades-animado {
            font-size: 3rem;
            font-weight: 900;
            margin: 15px 0 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: cambioColor 1.5s infinite alternate;
            letter-spacing: 2px;
        }
        @keyframes cambioColor {
            0% { color: #FFDC00; transform: scale(1); }
            25% { color: #2ECC40; transform: scale(1.05); }
            50% { color: #FF4136; transform: scale(1); }
            75% { color: #0074D9; transform: scale(1.05); }
            100% { color: #B10DC9; transform: scale(1); }
        }

        h1 { font-size: 2rem; margin: 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        h2 { font-size: 1.3rem; margin-bottom: 20px; font-weight: 400; }
        
        .subtitulo-premio {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 20px 0 15px;
            color: #FFDC00;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .mensaje-cpnb {
            font-size: 1rem;
            margin: 25px 0 20px;
            color: #fff;
            line-height: 1.5;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        .cpnb-title {
            font-weight: 700;
            color: #FFDC00;
            font-size: 1.1rem;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            text-align: center;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        button {
            width: 100%;
            padding: 15px;
            background-color: #FF4136;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.05); background-color: #ff2b1f; }
        button:disabled { background-color: #999; cursor: not-allowed; transform: none; }

        /* 🔗 Redes sociales */
        .social-icons {
            margin-top: 20px;
            font-size: 3rem;
            display: flex;
            justify-content: center;
            gap: 30px;
        }
        .social-icons a {
            color: white;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .social-icons a:hover {
            transform: scale(1.3);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }
        .social-icons .instagram:hover { color: #E1306C; }
        .social-icons .facebook:hover { color: #1877F2; }
        .social-icons .tiktok:hover { color: #00f2ea; }

        #mensaje-exito { display: none; }
        #formulario-section { display: block; }
        .hidden { display: none !important; }
        
        .error-msg {
            color: #ff8585;
            display: none;
            margin-top: 10px;
            font-size: 0.9rem;
            background: rgba(255, 65, 54, 0.2);
            padding: 10px;
            border-radius: 8px;
        }
        
        .semana-santa {
            font-size: 1.2rem;
            color: #2ECC40;
            font-weight: 600;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGO -->
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
        </div>

        <!-- CONTADOR DE VISITAS -->
        <h1 id="contador">Eres el visitante #...</h1>

        <!-- SECCIÓN DEL FORMULARIO -->
        <div id="formulario-section">
            <h2>Llena el formulario y participa por grandes premios</h2>
            
            <form id="miFormulario">
                <input type="text" id="nombre" placeholder="Nombre" required maxlength="50">
                <input type="text" id="apellido" placeholder="Apellido" required maxlength="50">
                <input type="number" id="cedula" placeholder="Cédula (8 dígitos)" required maxlength="8" pattern="\d{8}" title="Ingresa exactamente 8 dígitos numéricos">
                <button type="submit" id="btnEnviar">ENVIAR</button>
            </form>
            <p id="error-msg" class="error-msg"></p>
        </div>

        <!-- ✅ SECCIÓN DE ÉXITO -->
        <div id="mensaje-exito" class="hidden">
            <!-- 🌈 FELICITACIONES animado y GRANDE -->
            <div class="felicidades-animado">¡FELICITACIONES!</div>
            
            <h1 id="contador-exito">Eres el visitante #...</h1>
            
            <!-- 🎁 Subtítulo de premios -->
            <p class="subtitulo-premio">
                🎁 Estás participando por grandes premios<br>
                <span class="semana-santa">esta Semana Santa 2026</span>
            </p>
            
            <!-- 👮 Mensaje del CPNB Zulia -->
            <div class="mensaje-cpnb">
                <p class="cpnb-title">El Cuerpo de Policía Nacional Bolivariana<br>del Estado Zulia</p>
                <p>te invita a seguirnos en nuestras redes</p>
            </div>
            
            <!-- 🔗 Logos de redes sociales -->
            <div class="social-icons">
                <a href="https://instagram.com/TU_USUARIO" target="_blank" class="instagram" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://facebook.com/TU_USUARIO" target="_blank" class="facebook" title="Facebook">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="https://tiktok.com/@TU_USUARIO" target="_blank" class="tiktok" title="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // ⚙️ CONFIGURACIÓN - EDITA ESTO
        // ========================================
        const SUPABASE_URL = 'https://jjpukfsxduqtgbhtgiba.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqcHVrZnN4ZHVxdGdiaHRnaWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTI3MjcsImV4cCI6MjA5MDE4ODcyN30.whpdkHn0OjJHPxbzZjgEwsBD4tKtN-_hxN8VGtDW4SU';
        
        // ========================================
        // 🚀 INICIALIZACIÓN
        // ========================================
        let supabaseClient;

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Cliente Supabase creado');
        } catch (e) {
            console.error('❌ Error creando cliente Supabase:', e);
        }

        // ========================================
        // 📊 CONTADOR DE VISITAS
        // ========================================
        async function cargarVisitas() {
            try {
                const { data, error } = await supabaseClient
                    .from('contador_visitas')
                    .select('visitas')
                    .eq('id', 1)
                    .single();

                if (error) throw error;

                const nuevasVisitas = (data?.visitas || 0) + 1;
                
                const { error: updateError } = await supabaseClient
                    .from('contador_visitas')
                    .update({ visitas: nuevasVisitas })
                    .eq('id', 1);

                if (updateError) throw updateError;

                document.getElementById('contador').innerText = `Eres el visitante #${nuevasVisitas}`;
                document.getElementById('contador-exito').innerText = `Eres el visitante #${nuevasVisitas}`;
                
                console.log('✅ Contador actualizado:', nuevasVisitas);
                
            } catch (err) {
                console.error('❌ Error en contador:', err);
                document.getElementById('contador').innerText = "Eres el visitante #1,000+";
                document.getElementById('contador-exito').innerText = "Eres el visitante #1,000+";
            }
        }

        // ========================================
        // 📝 ENVÍO DEL FORMULARIO
        // ========================================
        document.getElementById('miFormulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const cedula = document.getElementById('cedula').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('btnEnviar');
            
            // Validar cédula: exactamente 8 dígitos
            if (!/^\d{8}$/.test(cedula)) {
                errorMsg.innerText = "⚠️ La cédula debe tener exactamente 8 dígitos numéricos.";
                errorMsg.style.display = 'block';
                return;
            }
            
            btn.innerText = "Enviando...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();

            try {
                console.log('📤 Enviando datos...');
                
                const { data, error } = await supabaseClient
                    .from('participantes')
                    .insert([{ nombre, apellido, cedula }])
                    .select();

                if (error) {
                    console.error('❌ Error Supabase:', error);
                    
                    if (error.code === '23505') { 
                        errorMsg.innerText = "⚠️ Esta cédula ya está registrada. ¡Gracias por participar!";
                    } else {
                        errorMsg.innerText = `❌ Error: ${error.message || 'Intenta nuevamente'}`;
                    }
                    errorMsg.style.display = 'block';
                    btn.innerText = "ENVIAR";
                    btn.disabled = false;
                } else {
                    console.log('✅ Registro exitoso');
                    // ÉXITO: Confeti + cambiar pantalla
                    lanzarConfeti();
                    document.getElementById('formulario-section').classList.add('hidden');
                    document.getElementById('mensaje-exito').classList.remove('hidden');
                    cargarVisitas();
                }
            } catch (err) {
                console.error('❌ Error inesperado:', err);
                errorMsg.innerText = "❌ Ocurrió un error. Revisa tu conexión.";
                errorMsg.style.display = 'block';
                btn.innerText = "ENVIAR";
                btn.disabled = false;
            }
        });

        // ========================================
        // 🎉 CONFETI
        // ========================================
        function lanzarConfeti() {
            const duration = 3 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: Math.random(), y: Math.random() - 0.2 } 
                }));
            }, 250);
        }

        // ========================================
        // 🔄 INICIAR
        // ========================================
        if (supabaseClient) {
            cargarVisitas();
        }
    </script>
</body>
</html>
